<!-- Contact Section -->
<section id="contact" class="contact">
    <div class="container">
        <h2 class="section-title" data-i18n="contact.title">Lad os tale</h2>
        <p class="section-subtitle" data-i18n="contact.subtitle">Interesseret i at arbejde sammen? Jeg glæder mig til at høre fra dig</p>

        <div class="contact-envelope-preview">
            <div class="letter-image">
                <div class="animated-mail">
                    <div class="back-fold"></div>
                    <div class="letter">
                        <div class="letter-border"></div>
                        <div class="letter-title">Skriv til mig</div>
                        <form class="contact-form contact-form-letter">
                            <div class="form-group">
                                <input type="text" placeholder="Dit navn" data-i18n-placeholder="contact.namePlaceholder" required>
                            </div>
                            <div class="form-group">
                                <input type="email" placeholder="Din email" data-i18n-placeholder="contact.emailPlaceholder" required>
                            </div>
                            <div class="form-group">
                                <textarea placeholder="Din besked" data-i18n-placeholder="contact.messagePlaceholder" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" data-i18n="contact.submit">Send besked</button>
                        </form>
                    </div>
                    <div class="top-fold"></div>
                    <div class="body"></div>
                    <div class="left-fold"></div>
                </div>
                <div class="shadow"></div>
            </div>
        </div>

        <div class="contact-content">
            <div class="contact-info">
                <div class="contact-item">
                    <h3 data-i18n="contact.emailTitle">Email</h3>
                    <a href="mailto:linneabergingwersen@gmail.com">linneabergingwersen@gmail.com</a>
                </div>
                <div class="contact-item">
                    <h3 data-i18n="contact.phoneTitle">Telefon</h3>
                    <a href="tel:+4593991125">+45 93 99 11 25</a>
                </div>
                <div class="contact-item">
                    <h3 data-i18n="contact.socialTitle">Sociale medier</h3>
                    <div class="social-links">
                        <a href="https://www.linkedin.com/in/linnea-ingwersen/" target="_blank" class="social-link" title="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                        <a href="https://www.instagram.com/linneaingwersen/" target="_blank" class="social-link" title="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="https://www.etsy.com/shop/ShadesAndLoops" target="_blank" class="social-link" title="Etsy">
                            <i class="fab fa-etsy"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
